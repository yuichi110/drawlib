version: '3'

tasks:
  lint:
    desc: Run linter (ruff)
    cmds:
      - uv run ruff check --preview src
      - uv run ruff check --preview tasks/scripts
      - uv run ruff check --preview tests

  type:
    desc: Run type checker (ty)
    env:
      PYTHONPATH: tasks/scripts
    cmds:
      - uv run ty check src/drawlib
      - uv run ty check tasks/scripts
      - uv run ty check tests

  type-ty:
    desc: Run type checker (ty)
    env:
      PYTHONPATH: tasks/scripts
    cmds:
      - uv run ty check src/drawlib
      - uv run ty check tasks/scripts
      - uv run ty check tests

  lines:
    desc: Count lines of code
    cmds:
      - uv run python tasks/scripts/count_lines.py

  docstring:
    desc: Check if forbidden type aliases appear in @guarded function docstrings
    cmds:
      - uv run python tasks/scripts/check_docstring.py

  default:
    desc: Run all checks (lint, type, and docstring)
    cmds:
      - task: lint
      - task: type
      - task: docstring