version: '3'

includes:
  pyproject: ./pyproject.yml

tasks:
  list-versions:
    desc: List all versions of drawlib from PyPI
    cmds:
      - uv run python tasks/scripts/pypi_tools.py --list_versions
  
  get-latest-version:
    desc: Get the latest version of drawlib from PyPI
    cmds:
      - uv run python tasks/scripts/pypi_tools.py --get_latest_version

  check-new-version:
    desc: Check if the new version is valid compared to PyPI
    cmds:
      - uv run python tasks/scripts/pypi_tools.py --check_new_version_ok

  check-new-version:allow_jump:
    desc: Check if the new version is valid compared to PyPI
    cmds:
      - uv run python tasks/scripts/pypi_tools.py --check_new_version_ok --allow_jump

  publish:
    desc: Publish the package to PyPI (Production)
    summary: |
      Releases the new version to the official PyPI repository.
      Automatically runs 'check-new-version' as a dependency to ensure safety.
    deps: [
      pyproject:update,
      check-new-version
    ]
    cmds:
      - rm -rf dist/
      - uv run python -m drawlib --purge_font_cache
      - uv build
      - uv publish --token $PYPI_TOKEN

  publish:allow_jump:
    desc: Publish the package to PyPI (Production) - Allow Version Jump
    summary: |
      Releases the new version to the official PyPI repository.
      Allows major/minor/patch version jumps (e.g., 0.2.x -> 0.5.0).
    deps: [
      pyproject:update,
      check-new-version:allow_jump
    ]
    cmds:
      - rm -rf dist/
      - uv run python -m drawlib --purge_font_cache
      - uv build
      - uv publish --token $PYPI_TOKEN